<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>五惠 原料處理記錄及分析系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --primary:#2d6a4f;--primary-m:#40916c;--primary-l:#d8f3dc;--primary-b:#95d5b2;
  --accent:#f4a261;--accent-d:#e76f51;--accent-l:#fef3e2;
  --green-m:#15803d;--green-l:#f0fdf4;--green-b:#86efac;
  --red-m:#dc2626;--red-l:#fee2e2;--red-b:#fca5a5;
  --amber-m:#d97706;--amber-l:#fef3c7;--amber-b:#fcd34d;
  --ink:#1a2e1e;--ink2:#3d5a45;--ink3:#6b8f71;--ink4:#9ab89f;
  --bg:#f5f9f5;--bg2:#edf4ee;--card:#ffffff;--line:#d4e8d6;--line2:#b8d4bb;
  --shadow:0 1px 4px rgba(45,106,79,.08);
  --shadow-md:0 4px 16px rgba(45,106,79,.12);
  --shadow-lg:0 8px 32px rgba(45,106,79,.15);
  --r:8px;--r2:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 50%,#40916c 100%);height:90px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 16px rgba(45,106,79,.4)}
.brand-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:.3px;white-space:nowrap}
.brand-sub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-top:2px}
.topnav{display:flex;gap:4px}
.tnav{padding:8px 17px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;color:rgba(255,255,255,.65);background:transparent;font-family:inherit;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap}
.tnav:hover{color:#fff;background:rgba(255,255,255,.12)}
.tnav.on{background:rgba(255,255,255,.2);color:#fff}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border-radius:20px;padding:5px 14px;font-size:12px;color:rgba(255,255,255,.75);font-family:'JetBrains Mono',monospace}
.live-dot{width:8px;height:8px;border-radius:50%;background:#74c69d;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:600px){
  .topbar{padding:6px 12px;height:auto;flex-direction:column;align-items:flex-start;gap:4px}
  .brand-name{font-size:16px}.brand-sub{display:none}
  .topnav{width:100%;gap:2px;overflow-x:auto}
  .tnav{padding:5px 8px;font-size:11px;flex-shrink:0}
  .live-pill{position:absolute;top:8px;right:10px;font-size:10px;padding:3px 8px}
}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:22px 20px 80px}

/* SELECTOR */
.selector-bar{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow)}
.sel-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sel-label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;font-family:'JetBrains Mono',monospace}
/* 品種按鈕 3欄Grid */
.fruit-btns{display:grid;grid-template-columns:repeat(3,auto);gap:6px}
.op-btns{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:8px 18px;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;border:2px solid var(--line2);background:var(--card);color:var(--ink3);transition:all .15s;font-family:inherit}
.fbtn:hover{border-color:var(--primary-m);color:var(--primary)}
.fbtn.on{color:#fff;border-color:transparent;box-shadow:var(--shadow-md)}
.obtn{padding:7px 15px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--line2);background:var(--card);color:var(--ink3);transition:all .15s;font-family:inherit}
.obtn:hover{border-color:var(--primary-m);color:var(--primary)}
.obtn.on{background:var(--primary-l);color:var(--primary);border-color:var(--primary-b);font-weight:600}
.div-v{width:1px;height:32px;background:var(--line);flex-shrink:0}

/* STAT CARDS 3欄 */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:linear-gradient(145deg,#ffffff 0%,#f5faf6 100%);border:1px solid var(--line);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:all .2s}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--sc,var(--primary));border-radius:var(--r2) var(--r2) 0 0}
.stat:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-lbl{font-size:10px;color:var(--ink3);letter-spacing:.8px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--sv,var(--primary))}
.stat-unit{font-size:11px;color:var(--ink3);margin-top:4px}
@media(max-width:600px){.stat-lbl{font-size:9px}.stat-val{font-size:18px}.stat{padding:10px 12px}}

/* 對比卡片式比較 */
.cmp-wrap{margin-bottom:20px}
.cmp-head{display:grid;grid-template-columns:130px 1fr 1fr;gap:0;margin-bottom:0}
.cmp-head-key{}
.cmp-head-card{padding:16px;text-align:center;border-radius:var(--r2) var(--r2) 0 0;position:relative}
.cmp-head-best{background:linear-gradient(135deg,#40916c,#2d6a4f);color:#fff;margin-right:6px}
.cmp-head-worst{background:linear-gradient(135deg,#e76f51,#dc2626);color:#fff;margin-left:6px}
.cmp-head-title{font-size:15px;font-weight:700;margin-bottom:3px}
.cmp-head-op{font-size:12px;opacity:.9}
.cmp-head-eff{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:8px;line-height:1}
.cmp-head-eff-unit{font-size:11px;opacity:.85;margin-top:2px}
.cmp-body{background:var(--card);border:1px solid var(--line);border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden;box-shadow:var(--shadow)}
.cmp-tbl{display:grid;grid-template-columns:130px 1fr 1fr}
.cmp-cell{padding:11px 16px;border-top:1px solid var(--line);font-size:13px;display:flex;align-items:center}
.cmp-cell-key{background:var(--bg2);color:var(--ink3);font-size:12px;font-weight:500}
.cmp-cell-best{justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600}
.cmp-cell-worst{justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600}
.cmp-summary{grid-column:1/-1;padding:12px 16px;background:var(--bg2);font-size:12px;color:var(--ink3);border-top:1px solid var(--line);line-height:1.5}
@media(max-width:600px){
  .cmp-head,.cmp-tbl{grid-template-columns:80px 1fr 1fr}
  .cmp-head-card{padding:10px}.cmp-head-title{font-size:13px}.cmp-head-eff{font-size:19px}
  .cmp-cell{padding:8px 10px;font-size:11px}
}

/* BREAKDOWN */
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.bk{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.bk::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--bc,var(--primary))}
.bk-lbl{font-size:11px;color:var(--ink3);margin-bottom:6px;font-weight:500}
.bk-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--bc,var(--primary));line-height:1}
.bk-unit{font-size:11px;color:var(--ink4);margin-top:3px}
.bk-pct{font-size:13px;font-weight:600;color:var(--ink2);margin-top:2px}

/* CHART CARDS */
.cc{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px}
.cc:hover{border-color:var(--line2)}
.cc-hdr{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.cc-title{font-size:13px;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:7px}
.cc-sub{font-size:11px;color:var(--ink4)}
.cc-body{padding:16px}
.ch300{height:300px;position:relative}

/* BATCH TABLE */
.btbl{width:100%;border-collapse:collapse;font-size:13px}
.btbl th{padding:10px 12px;text-align:left;font-weight:600;color:var(--ink3);font-size:11px;border-bottom:2px solid var(--line);background:var(--bg2);letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
.btbl td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.btbl tr:last-child td{border:none}
.btbl tr:hover td{background:var(--bg2)}
.btbl tr.best td{background:#f0fdf4}
.btbl tr.worst td{background:#fff5f5}
@media(max-width:600px){.hide-mobile{display:none!important}}

/* BADGES */
.badge{display:inline-flex;padding:3px 9px;border-radius:5px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.bg{background:var(--green-l);color:var(--green-m);border:1px solid var(--green-b)}
.br{background:var(--red-l);color:var(--red-m);border:1px solid var(--red-b)}
.by{background:var(--amber-l);color:var(--amber-m);border:1px solid var(--amber-b)}
.bp{background:var(--primary-l);color:var(--primary);border:1px solid var(--primary-b)}

/* SECTION */
.sec{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.sec::before,.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--primary-b),transparent)}
.sec-lbl{font-size:11px;font-weight:700;color:var(--primary-m);letter-spacing:2px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.hidden{display:none!important}
.empty{text-align:center;padding:60px;color:var(--ink4)}

/* ── 列印專用（匯出PDF）── */
.print-break{display:none}
@media print{
  @page{size:A4 portrait;margin:7mm}
  html,body{background:#fff!important;width:196mm!important}
  body{font-size:10px}
  .topbar{position:static!important;box-shadow:none!important;padding:6px 12px!important}
  .brand-name{font-size:16px!important}
  .topnav,.live-pill,#btn-pdf{display:none!important}
  .main{max-width:196mm!important;width:196mm!important;padding:0!important;margin:0!important}
  .selector-bar{box-shadow:none;border:1px solid #ccc;padding:8px 12px!important;margin-bottom:8px!important}
  /* 縮小區塊標題間距 */
  .sec{margin:8px 0 6px!important;break-after:avoid;page-break-after:avoid}
  /* KPI 緊湊 */
  .stat-row{gap:6px;margin-bottom:8px!important}
  .stat{padding:8px 12px!important;break-inside:avoid}
  .stat-val{font-size:19px!important}
  .stat-lbl{font-size:9px!important;margin-bottom:3px!important}
  /* 圖表壓縮高度 */
  .cc{margin-bottom:8px!important;break-inside:avoid;page-break-inside:avoid}
  .cc-hdr{padding:8px 12px!important}
  .cc-body{padding:8px!important}
  .cc-body canvas{max-width:100%!important;height:auto!important}
  .ch300{height:170px!important}
  /* 比較卡片不被切 */
  .cmp-wrap,.cmp-body,.cmp-head{break-inside:avoid;page-break-inside:avoid}
  .cmp-head-eff{font-size:20px!important}
  .cmp-cell{padding:7px 12px!important}
  .cmp-summary{padding:8px 12px!important}
  /* 明細表字體縮小確保完整 */
  .btbl{font-size:9px}
  .btbl th,.btbl td{padding:5px 6px}
  /* 第1頁分頁點：品種+KPI+堆疊圖+比較之後換頁 */
  .print-break{display:block!important;break-before:page;page-break-before:always;height:0}
  /* 顏色完整印出 */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
}
</style>
</head>

<div class="topbar">

    </div>
  </div>

  <!-- 最佳/最差批三欄比較 -->
  <div class="sec"><div class="sec-lbl">最佳批 vs 最差批</div></div>
  <div class="cmp-wrap" id="cmp-wrap"></div>

  <!-- 列印分頁點：第1頁結束（品種+KPI+堆疊圖+比較）-->

  <div class="sec"><div class="sec-lbl">不良品率趨勢</div></div>
  <div class="cc">
    <div class="cc-hdr"><div class="cc-title">⚠️ 不良品率趨勢</div><span class="cc-sub" id="dr-avg-lbl"></span></div>
    <div class="cc-body"><div class="ch300"><canvas id="chart-dr"></canvas></div></div>
  </div>

  <!-- 效率圖 -->
  <div class="sec"><div class="sec-lbl">各批次效率分析</div></div>
  <div class="cc">
    <div class="cc-hdr">
      <div class="cc-title">⚡ 效率 KG/人時</div>
      <span class="cc-sub" id="eff-avg-lbl"></span>
    </div>
    <div class="cc-body"><div class="ch300"><canvas id="chart-eff"></canvas></div></div>
  </div>

  <!-- 批次明細表（最下方）-->
  <div class="sec"><div class="sec-lbl">批次明細記錄</div></div>
  <div class="cc">
    <div class="cc-hdr">
      <div class="cc-title">📋 各批次詳細資料</div>
      <span class="cc-sub">🏆 最佳批效率　⚠️ 最差批效率</span>
    </div>
    <div class="cc-body" style="padding:0;overflow-x:auto"><div id="batch-table"></div></div>
  </div>

</div>

Chart.defaults.color='#6b8f71';
Chart.defaults.borderColor='rgba(212,232,214,.6)';
Chart.defaults.font.family="'JetBrains Mono','Noto Sans TC',sans-serif";
Chart.defaults.font.size=12;

// 註冊 datalabels 外掛，但預設全域關閉（只在列印時由 PRINT_MODE 開啟）
if(window.ChartDataLabels){Chart.register(window.ChartDataLabels);}
Chart.defaults.plugins.datalabels={display:false};
var PRINT_MODE=false; // 列印時設 true，圖表才顯示數值標籤

document.addEventListener('DOMContentLoaded',loadData);

function loadData(){
  fetch(API+'?action=getBatches')
  .then(function(r){return r.json();})
  .then(function(data){
    var sheets=Array.isArray(data)?data:(data.batches||[]);
    var sids=sheets.map(function(r){return String(r['批次ID']||'');});
    var bi=BUILTIN.filter(function(b){return sids.indexOf(b.id)<0;});
    ALL=bi.concat(sheets.map(cvtSheet));
    document.getElementById('upd-txt').textContent='更新：'+new Date().toLocaleTimeString('zh-TW');
    initFruits();
  })
  .catch(function(){
    ALL=BUILTIN.slice();
    document.getElementById('upd-txt').textContent='離線（內建資料）';
    initFruits();
  });
}

function cvtSheet(r){
  function pct(k){var v=parseFloat(String(r[k]||'').replace('%',''))||0;return(v>0&&v<1)?v*100:v;}
  return{
    id:String(r['批次ID']||''),date:fmtDate(r['作業日期']),
    fruit:String(r['品種']||''),op:String(r['作業類型']||''),
    raw:parseFloat(r['原料重量 KG'])||0,
    out:parseFloat(r['主產出 KG'])||0,
    def:parseFloat(r['不良品 KG'])||0,
    sub1:parseFloat(r['副產出1 KG'])||0,
    sub2:parseFloat(r['副產出2 KG'])||0,
    yr:pct('步留率%'),dr:pct('不良品率%'),lr:pct('耗損率%'),
    workers:parseFloat(r['作業人數'])||0,
    mh:parseFloat(r['總人力工時hr'])||0,
    eff:parseFloat(r['效率KG/人時'])||0,
    notes:String(r['備註']||'')
  };
}

function fmtDate(d){
  if(!d)return'';
  var s=String(d);
  if(s.indexOf('T')>-1)s=s.slice(0,10);
  return s.replace(/-/g,'/');
}
function avg(arr){return arr.length?arr.reduce(function(s,v){return s+v;},0)/arr.length:0;}

// 品種按鈕（固定3欄順序）
function initFruits(){
  var counts={};
  ALL.forEach(function(r){if(r.fruit)counts[r.fruit]=(counts[r.fruit]||0)+1;});
  var order=FRUIT_ORDER.filter(function(f){return counts[f];});
  Object.keys(counts).forEach(function(f){if(order.indexOf(f)<0)order.push(f);});
  document.getElementById('fruit-btns').innerHTML=order.map(function(f){
    var fc=FC[f]||{col:'#6b8f71',ico:'🌱'};
    return'<button class="fbtn" data-fruit="'+f+'" onclick="selFruit(\''+f+'\')">'
      +fc.ico+' '+f+' <span style="font-size:11px;opacity:.65">('+counts[f]+')</span></button>';
  }).join('');
  selFruit(order[0]);
}

function selFruit(fruit){
  SEL_FRUIT=fruit;SEL_OP=null;
  var fc=FC[fruit]||{col:'#2d6a4f'};
  document.querySelectorAll('.fbtn').forEach(function(b){
    var on=b.dataset.fruit===fruit;
    b.classList.toggle('on',on);
    b.style.background=on?fc.col:'';b.style.borderColor=on?fc.col:'';b.style.color=on?'#fff':'';
  });
  var ops={};
  ALL.filter(function(r){return r.fruit===fruit;}).forEach(function(r){if(r.op)ops[r.op]=(ops[r.op]||0)+1;});
  document.getElementById('op-btns').innerHTML=Object.keys(ops).map(function(op){
    return'<button class="obtn" data-op="'+op+'" onclick="selOp(\''+op+'\')">'
      +op+' <span style="font-size:11px;opacity:.65">('+ops[op]+')</span></button>';
  }).join('');
  selOp(Object.keys(ops)[0]);
}

function selOp(op){
  SEL_OP=op;
  document.querySelectorAll('.obtn').forEach(function(b){b.classList.toggle('on',b.dataset.op===op);});
  render();
}

function render(){
  if(!SEL_FRUIT||!SEL_OP)return;
  var rows=ALL.filter(function(r){return r.fruit===SEL_FRUIT&&r.op===SEL_OP;});
  rows.sort(function(a,b){return a.date.localeCompare(b.date);});
  if(!rows.length){
    document.getElementById('stat-row').innerHTML='<div class="empty" style="grid-column:1/-1">尚無資料</div>';
    return;
  }
  renderStats(rows);
  // 智慧顯示：多產出品種→Breakdown，單一產出→三段堆疊
  var isMultiOut=!!(MULTI_OUT[SEL_FRUIT+'-'+SEL_OP]);
  var stackedSec=document.getElementById('stacked-section');
  if(isMultiOut){
    renderBreakdown(rows);
    if(stackedSec)stackedSec.classList.add('hidden');
  }else{
    document.getElementById('breakdown-section').classList.add('hidden');
    if(stackedSec)stackedSec.classList.remove('hidden');
    renderStacked(rows);
  }
  renderCompare(rows);renderYr(rows);renderDr(rows);
  renderEff(rows);renderTable(rows);
}

// KPI 8張（3欄）
function renderStats(rows){
  var tRaw=rows.reduce(function(s,r){return s+r.raw;},0);
  var tOut=rows.reduce(function(s,r){return s+r.out;},0);
  var avgYr=tRaw>0?tOut/tRaw*100:avg(rows.map(function(r){return r.yr;}).filter(Boolean));
  var avgDr=avg(rows.map(function(r){return r.dr;}).filter(Boolean));
  var avgLr=avg(rows.map(function(r){return r.lr;}).filter(function(v){return v>0;}));
  var effs=rows.filter(function(r){return r.eff>0;}).map(function(r){return r.eff;});
  var yrs=rows.map(function(r){return r.yr;}).filter(Boolean);
  var fc=FC[SEL_FRUIT]||{col:'#2d6a4f'};
  var yrC=avgYr>=80?'#15803d':avgYr>=65?'#d97706':'#dc2626';
  var stats=[
    {lbl:'批次數',val:rows.length,unit:'批',sc:fc.col,sv:fc.col},
    {lbl:'總投入量',val:tRaw.toFixed(0),unit:'KG',sc:'#748cab',sv:'#445e78'},
    {lbl:'平均效率',val:effs.length?avg(effs).toFixed(1):'N/A',unit:'KG/人時',sc:'#219ebc',sv:'#0d6e8a'},
    {lbl:'平均步留率',val:avgYr.toFixed(1),unit:'%',sc:yrC,sv:yrC},
    {lbl:'最高步留率',val:yrs.length?Math.max.apply(null,yrs).toFixed(1):'N/A',unit:'%',sc:'#15803d',sv:'#14532d'},
    {lbl:'最低步留率',val:yrs.length?Math.min.apply(null,yrs).toFixed(1):'N/A',unit:'%',sc:'#dc2626',sv:'#991b1b'},
    {lbl:'平均不良品率',val:avgDr.toFixed(1),unit:'%',sc:'#dc2626',sv:'#991b1b'},
    {lbl:'平均耗損率',val:avgLr>0?avgLr.toFixed(1):'0.0',unit:'%',sc:'#748cab',sv:'#445e78'}
  ];
  document.getElementById('stat-row').innerHTML=stats.map(function(s){
    return'<div class="stat" style="--sc:'+s.sc+';--sv:'+s.sv+'">'+
      '<div class="stat-lbl">'+s.lbl+'</div>'+
      '<div class="stat-val">'+s.val+'</div>'+
      '<div class="stat-unit">'+s.unit+'</div></div>';
  }).join('');
}

// Breakdown（含耗損段）
function getDetail(r){
  if(SEL_FRUIT==='柚子'&&SEL_OP==='剝柚子'){
    var d=POMELO_DETAIL[r.id];
    if(!d&&(r.sub1||r.sub2||r.out))d={skin:r.sub1||0,neck:r.sub2||0,flesh:r.out||0,raw:r.raw};
    return d;
  }
  if(SEL_FRUIT==='橘子'){
    var td=TANGERINE_DETAIL[r.id];
    if(!td){
      if(SEL_OP==='剝橘子（玻璃瓶）')td={flesh:r.out,skin:r.sub1,juice:r.sub2};
      else td={juice:r.out,skin:r.sub1};
    }
    return td;
  }
  return null;
}

function calcLossPct(r,detail,cfg){
  if(!detail)return 0;
  var sumParts=0;
  cfg.parts.forEach(function(p){
    if(p.key!=='loss'&&p.key!=='def'&&detail[p.key])sumParts+=detail[p.key];
  });
  var loss=Math.max(r.raw-sumParts-r.def,0);
  return r.raw>0?loss/r.raw*100:0;
}

function renderBreakdown(rows){
  var key=SEL_FRUIT+'-'+SEL_OP;
  var cfg=MULTI_OUT[key];
  var sec=document.getElementById('breakdown-section');
  if(!cfg){sec.classList.add('hidden');return;}
  sec.classList.remove('hidden');
  document.getElementById('breakdown-title').textContent=cfg.title;
  document.getElementById('breakdown-chart-title').textContent=cfg.title+' — 各批次佔比';

  var totals={};cfg.parts.forEach(function(p){totals[p.key]=0;});
  var tRaw=0;
  rows.forEach(function(r){
    tRaw+=r.raw;
    var detail=getDetail(r);
    cfg.parts.forEach(function(p){
      if(p.key==='def')totals.def+=r.def;
      else if(p.key==='loss'){
        var sumP=0;
        cfg.parts.forEach(function(p2){if(p2.key!=='loss'&&p2.key!=='def'&&detail&&detail[p2.key])sumP+=detail[p2.key];});
        totals.loss+=Math.max(r.raw-sumP-r.def,0);
      }
      else if(detail&&detail[p.key])totals[p.key]+=detail[p.key];
    });
  });

  var labels=rows.map(function(r){return r.date;});
  var datasets=cfg.parts.map(function(p){
    var data=rows.map(function(r){
      var detail=getDetail(r);
      if(p.key==='def')return r.raw>0?r.def/r.raw*100:0;
      if(p.key==='loss')return calcLossPct(r,detail,cfg);
      if(detail&&detail[p.key]!==undefined)return r.raw>0?detail[p.key]/r.raw*100:0;
      return null;
    });
    return{label:p.label,data:data,backgroundColor:p.col+'cc',borderColor:p.col,borderWidth:1};
  });

  mk('chart-breakdown',{type:'bar',data:{labels:labels,datasets:datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',padding:10,
        callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(1)+'%';}}},
      datalabels:{display:function(){return PRINT_MODE;},color:'#fff',
        font:{weight:'700',size:10},
        formatter:function(v){return(v&&v>=4)?v.toFixed(1)+'%':'';}}},
    scales:{
      x:{stacked:true,ticks:{maxRotation:45}},
      y:{stacked:true,max:110,title:{display:true,text:'%'},
        ticks:{stepSize:10,callback:function(v){return v;}}}
    }
  }});
}

// 三段堆疊圖（X軸=日期）
function renderStacked(rows){
  var labels=rows.map(function(r){return r.date;});
  var datasets=[
    {label:'步留率',data:rows.map(function(r){return parseFloat(r.yr.toFixed(1))||0;}),
      backgroundColor:'rgba(21,128,61,.75)',borderColor:'#15803d',borderWidth:1},
    {label:'作業耗損率',data:rows.map(function(r){
      return parseFloat(Math.max(r.lr>0?r.lr:100-r.yr-r.dr,0).toFixed(1));
    }),backgroundColor:'rgba(148,163,184,.65)',borderColor:'#64748b',borderWidth:1},
    {label:'不良品率',data:rows.map(function(r){return parseFloat(r.dr.toFixed(1))||0;}),
      backgroundColor:'rgba(220,38,38,.7)',borderColor:'#dc2626',borderWidth:1}
  ];
  mk('chart-stacked',{type:'bar',data:{labels:labels,datasets:datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',padding:10,
        callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(1)+'%';}}},
      datalabels:{display:function(){return PRINT_MODE;},color:'#fff',
        font:{weight:'700',size:11},
        formatter:function(v){return v>=3?v.toFixed(1)+'%':'';}}},
    scales:{
      x:{stacked:true,ticks:{maxRotation:45}},
      y:{stacked:true,min:0,max:110,title:{display:true,text:'%'},
        ticks:{stepSize:10,callback:function(v){return v;}}}
    }
  }});
}

// 三欄比較表（最佳/最差）
function renderCompare(rows){
  var effRows=rows.filter(function(r){return r.eff>0&&r.mh>0;});
  if(!effRows.length){
    document.getElementById('cmp-wrap').innerHTML='<div class="empty">無效率記錄</div>';
    return;
  }
  var sorted=effRows.slice().sort(function(a,b){return b.eff-a.eff;});
  var best=sorted[0],worst=sorted[sorted.length-1];

  // 原料資訊摘要（優先用備註，否則組合原料狀況資訊）
  function summary(r){
    if(r.notes&&r.notes.trim())return r.notes.trim();
    return '投入 '+r.raw.toLocaleString()+'KG，步留率 '+r.yr.toFixed(1)+'%';
  }

  // 明細列（不含批次、日期已移到卡片標題區）
  var fields=[
    {lbl:'日期',fn:function(r){return r.date;}},
    {lbl:'投入量',fn:function(r){return r.raw.toLocaleString()+' KG';}},
    {lbl:'步留率',fn:function(r,isBest){
      return'<span style="color:'+(isBest?'var(--green-m)':'var(--red-m)')+'">'+r.yr.toFixed(1)+'%</span>';}},
    {lbl:'不良品率',fn:function(r){return r.dr.toFixed(1)+'%';}},
    {lbl:'耗損率',fn:function(r){var lr=r.lr>0?r.lr:Math.max(100-r.yr-r.dr,0);return lr.toFixed(1)+'%';}}
  ];

  var opName=SEL_OP||'';
  // 頂部卡片標題區（含作業類型 + 效率大字）
  var head='<div class="cmp-head">'+
    '<div class="cmp-head-key"></div>'+
    '<div class="cmp-head-card cmp-head-best">'+
      '<div class="cmp-head-title">🏆 最佳批</div>'+
      '<div class="cmp-head-op">'+opName+'</div>'+
      '<div class="cmp-head-eff">'+best.eff.toFixed(2)+'</div>'+
      '<div class="cmp-head-eff-unit">KG/人時</div>'+
    '</div>'+
    '<div class="cmp-head-card cmp-head-worst">'+
      '<div class="cmp-head-title">⚠️ 最差批</div>'+
      '<div class="cmp-head-op">'+opName+'</div>'+
      '<div class="cmp-head-eff">'+worst.eff.toFixed(2)+'</div>'+
      '<div class="cmp-head-eff-unit">KG/人時</div>'+
    '</div>'+
  '</div>';

  // 明細表格
  var body='<div class="cmp-body"><div class="cmp-tbl">';
  fields.forEach(function(f){
    body+='<div class="cmp-cell cmp-cell-key">'+f.lbl+'</div>';
    body+='<div class="cmp-cell cmp-cell-best">'+f.fn(best,true)+'</div>';
    body+='<div class="cmp-cell cmp-cell-worst">'+f.fn(worst,false)+'</div>';
  });
  body+='</div>';
  // 原料資訊摘要
  body+='<div class="cmp-summary">📋 最佳批：'+summary(best)+'</div>';
  body+='<div class="cmp-summary">📋 最差批：'+summary(worst)+'</div>';
  body+='</div>';

  document.getElementById('cmp-wrap').innerHTML=head+body;
}

// 步留率折線+填色（annotation平均線，X軸=日期，Y軸整數）
function renderYr(rows){
  var labels=rows.map(function(r){return r.date;});
  var yrs=rows.map(function(r){return r.yr||null;});
  var valid=yrs.filter(Boolean);
  var avgYr=valid.length?avg(valid):0;
  var fc=FC[SEL_FRUIT]||{col:'#2d6a4f'};
  document.getElementById('yr-avg-lbl').textContent='平均 '+avgYr.toFixed(1)+'%';
  mk('chart-yr',{type:'line',data:{labels:labels,datasets:[
    {label:'步留率',data:yrs,borderColor:fc.col,backgroundColor:fc.col+'25',fill:true,
      tension:0.4,pointRadius:7,pointHoverRadius:10,
      pointBackgroundColor:rows.map(function(r){return r.yr>=avgYr?fc.col:'#dc2626';}),
      pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:2.5,spanGaps:true}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',padding:10,
        callbacks:{label:function(c){return '步留率: '+(c.parsed.y?c.parsed.y.toFixed(1)+'%':'無資料');}}},
      datalabels:{display:function(){return PRINT_MODE;},align:'top',anchor:'end',
        color:'#15803d',font:{weight:'700',size:11},
        formatter:function(v){return v?v.toFixed(1)+'%':'';}},
      annotation:{annotations:{avgLine:{
        type:'line',yMin:avgYr,yMax:avgYr,
        borderColor:'#94a3b8',borderDash:[5,4],borderWidth:2,
        label:{display:true,content:'平均 '+avgYr.toFixed(1)+'%',position:'end',
          backgroundColor:'rgba(148,163,184,.8)',color:'#fff',font:{size:11}}
      }}}
    },
    scales:{
      x:{ticks:{maxRotation:45}},
      y:{title:{display:true,text:'%'},
        min:Math.max(0,Math.floor(Math.min.apply(null,valid))-3),
        max:Math.ceil(Math.max.apply(null,valid))+3,
        ticks:{stepSize:1,precision:0,callback:function(v){return v;}}}
    }
  }});
}

// 不良品率折線+填色（annotation平均線，X軸=日期，Y軸整數）
function renderDr(rows){
  var labels=rows.map(function(r){return r.date;});
  var drs=rows.map(function(r){return r.dr||null;});
  var valid=drs.filter(Boolean);
  var avgDr=valid.length?avg(valid):0;
  document.getElementById('dr-avg-lbl').textContent='平均 '+avgDr.toFixed(1)+'%';
  mk('chart-dr',{type:'line',data:{labels:labels,datasets:[
    {label:'不良品率',data:drs,borderColor:'#dc2626',backgroundColor:'rgba(220,38,38,.12)',fill:true,
      tension:0.4,pointRadius:7,pointHoverRadius:10,
      pointBackgroundColor:rows.map(function(r){return r.dr<=avgDr?'#15803d':'#dc2626';}),
      pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:2.5,spanGaps:true}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',padding:10,
        callbacks:{label:function(c){return '不良品率: '+(c.parsed.y?c.parsed.y.toFixed(1)+'%':'無資料');}}},
      datalabels:{display:function(){return PRINT_MODE;},align:'top',anchor:'end',
        color:'#dc2626',font:{weight:'700',size:11},
        formatter:function(v){return v?v.toFixed(1)+'%':'';}},
      annotation:{annotations:{avgLine:{
        type:'line',yMin:avgDr,yMax:avgDr,
        borderColor:'#94a3b8',borderDash:[5,4],borderWidth:2,
        label:{display:true,content:'平均 '+avgDr.toFixed(1)+'%',position:'end',
          backgroundColor:'rgba(148,163,184,.8)',color:'#fff',font:{size:11}}
      }}}
    },
    scales:{
      x:{ticks:{maxRotation:45}},
      y:{title:{display:true,text:'%'},
        min:Math.max(0,Math.floor(Math.min.apply(null,valid))-3),
        max:Math.ceil(Math.max.apply(null,valid))+3,
        ticks:{stepSize:1,precision:0,callback:function(v){return v;}}}
    }
  }});
}

// 批次明細表（刪批次欄，加耗損率，手機隱藏備註）
function renderTable(rows){
  var effRows=rows.filter(function(r){return r.eff>0;});
  var bestEff=effRows.length?Math.max.apply(null,effRows.map(function(r){return r.eff;})):0;
  var worstEff=effRows.length>1?Math.min.apply(null,effRows.map(function(r){return r.eff;})):0;
  var avgYr=avg(rows.map(function(r){return r.yr;}).filter(Boolean));

  var html=rows.map(function(r){
    var isBest=r.eff>0&&r.eff===bestEff;
    var isWorst=effRows.length>1&&r.eff>0&&r.eff===worstEff;
    var yrCls=r.yr>=(avgYr+1)?'bg':r.yr>=(avgYr-3)?'bp':'br';
    var lr=r.lr>0?r.lr:Math.max(100-r.yr-r.dr,0);
    // 耗損KG：原料 - 主產出 - 副產出 - 不良品（多產出品種扣除副產出）
    var subKg=(parseFloat(r.sub1)||0)+(parseFloat(r.sub2)||0);
    var lossKg=Math.max(r.raw-r.out-subKg-r.def,0);
    return'<tr class="'+(isBest?'best':isWorst?'worst':'')+'">'+
      '<td style="font-size:16px">'+(isBest?'🏆':isWorst?'⚠️':'')+'</td>'+
      '<td style="white-space:nowrap;font-size:12px">'+r.date+'</td>'+
      '<td style="text-align:right">'+r.raw.toLocaleString()+'</td>'+
      '<td style="text-align:right">'+r.out.toLocaleString()+'</td>'+
      '<td style="text-align:right">'+r.def+'</td>'+
      '<td style="text-align:right">'+lossKg.toFixed(0)+'</td>'+
      '<td><span class="badge '+yrCls+'">'+r.yr.toFixed(1)+'%</span></td>'+
      '<td><span class="badge '+(r.dr>(avgYr>50?10:5)?'br':'by')+'">'+r.dr.toFixed(1)+'%</span></td>'+
      '<td><span class="badge by">'+lr.toFixed(1)+'%</span></td>'+
      '<td style="text-align:center">'+(r.workers||'-')+'</td>'+
      '<td style="text-align:center">'+(r.mh||'-')+'</td>'+
      '<td style="font-weight:700;text-align:right;color:'+(r.eff>0?(isBest?'var(--green-m)':isWorst?'var(--red-m)':'var(--ink)'):'var(--ink4)')+'">'+
      (r.eff>0?r.eff.toFixed(2):'—')+'</td>'+
      '<td class="hide-mobile" style="font-size:12px;color:var(--ink3)">'+r.notes+'</td>'+
      '</tr>';
  }).join('');

  document.getElementById('batch-table').innerHTML=
    '<table class="btbl"><thead><tr>'+
    '<th></th><th>日期</th>'+
    '<th style="text-align:right">投入KG</th><th style="text-align:right">主產出KG</th>'+
    '<th style="text-align:right">不良品KG</th><th style="text-align:right">耗損KG</th>'+
    '<th>步留率</th><th>不良品率</th><th>耗損率</th>'+
    '<th style="text-align:center">人數</th><th style="text-align:center">工時hr</th>'+
    '<th style="text-align:right">效率KG/人時</th>'+
    '<th class="hide-mobile">備註</th>'+
    '</tr></thead><tbody>'+html+'</tbody></table>';
}

// 效率圖（最下方，annotation平均線，X軸=日期，Y軸=數字+單位標題）
function renderEff(rows){
  var labels=rows.map(function(r){return r.date;});
  var effs=rows.map(function(r){return r.eff>0?r.eff:null;});
  var valid=effs.filter(Boolean);
  var avgE=valid.length?avg(valid):0;
  var fc=FC[SEL_FRUIT]||{col:'#2d6a4f'};
  document.getElementById('eff-avg-lbl').textContent='平均 '+avgE.toFixed(2)+' KG/人時';
  var bgCols=rows.map(function(r){return r.eff>0?(r.eff>=avgE?fc.col+'cc':'rgba(220,38,38,.7)'):'rgba(148,163,184,.3)';});
  mk('chart-eff',{type:'bar',data:{labels:labels,datasets:[
    {label:'效率 KG/人時',data:effs,backgroundColor:bgCols,borderColor:bgCols,borderWidth:1.5,borderRadius:5}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',padding:10,
        callbacks:{label:function(c){return '效率: '+(c.parsed.y?c.parsed.y.toFixed(2)+' KG/人時':'無工時記錄');}}},
      datalabels:{display:function(){return PRINT_MODE;},align:'top',anchor:'end',
        color:'#1a2e1e',font:{weight:'700',size:11},
        formatter:function(v){return v?v.toFixed(2):'';}},
      annotation:{annotations:{avgLine:{
        type:'line',yMin:avgE,yMax:avgE,
        borderColor:'#94a3b8',borderDash:[5,4],borderWidth:2,
        label:{display:true,content:'平均 '+avgE.toFixed(2)+' KG/人時',position:'end',
          backgroundColor:'rgba(148,163,184,.8)',color:'#fff',font:{size:11}}
      }}}
    },
    scales:{
      x:{ticks:{maxRotation:45}},
      y:{title:{display:true,text:'KG/人時'},
        min:0,
        max:(function(){var m=valid.length?Math.max.apply(null,valid):10;return Math.max(5,Math.ceil(m*1.3));})(),
        ticks:{precision:1,callback:function(v){return v;}}}
    }
  }});
}

function mk(id,cfg){
  if(CH[id]){CH[id].destroy();delete CH[id];}
  var ctx=document.getElementById(id);if(!ctx)return;
  CH[id]=new Chart(ctx,cfg);
}

// ── 一鍵匯出 PDF（改用瀏覽器原生列印，最穩定，格式不跑掉）──
function exportPDF(){
  var d=new Date();
  var dateStr=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  var origTitle=document.title;
  document.title='五惠「'+(SEL_FRUIT||'全部')+'」原料處理_'+dateStr;

  // 列印前：開啟數值標籤 + resize 圖表以適配 A4 列印寬度
  function applyPrintCharts(on){
    PRINT_MODE=on;
    Object.keys(CH).forEach(function(k){if(CH[k]){CH[k].update();CH[k].resize();}});
  }
  var beforeH=function(){setTimeout(function(){applyPrintCharts(true);},10);};
  var afterH=function(){
    setTimeout(function(){applyPrintCharts(false);document.title=origTitle;},50);
    window.removeEventListener('beforeprint',beforeH);
    window.removeEventListener('afterprint',afterH);
  };
  window.addEventListener('beforeprint',beforeH);
  window.addEventListener('afterprint',afterH);

  // 先開啟數值標籤+resize，稍等渲染完成再列印
  applyPrintCharts(true);
  setTimeout(function(){window.print();},400);
}
</script>
