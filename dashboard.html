<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>五惠 原料處理記錄及分析系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  /* 國際水果產業色系 - 清爽自然 */
  --primary:#2d6a4f;      /* 深森林綠 */
  --primary-m:#40916c;    /* 中綠 */
  --primary-l:#d8f3dc;    /* 淡綠 */
  --primary-b:#95d5b2;    /* 綠色邊框 */
  --accent:#f4a261;       /* 暖橙（水果感）*/
  --accent-d:#e76f51;     /* 深橙 */
  --accent-l:#fef3e2;     /* 淡橙 */
  --gold:#e9c46a;         /* 金黃 */
  --sky:#219ebc;          /* 天空藍 */
  --sky-l:#e0f4f8;        /* 淡藍 */

  --green-m:#15803d;--green-l:#f0fdf4;--green-b:#86efac;
  --red-m:#dc2626;--red-l:#fee2e2;--red-b:#fca5a5;
  --amber-m:#d97706;--amber-l:#fef3c7;--amber-b:#fcd34d;

  --ink:#1a2e1e;          /* 深綠墨色 */
  --ink2:#3d5a45;
  --ink3:#6b8f71;
  --ink4:#9ab89f;
  --bg:#f5f9f5;           /* 極淡綠白 */
  --bg2:#edf4ee;
  --card:#ffffff;
  --line:#d4e8d6;
  --line2:#b8d4bb;

  --shadow:0 1px 4px rgba(45,106,79,.08);
  --shadow-md:0 4px 16px rgba(45,106,79,.12);
  --shadow-lg:0 8px 32px rgba(45,106,79,.15);
  --r:8px;--r2:12px;--r3:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}

/* ── TOPBAR ── */
.topbar{background:var(--primary);height:90px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 16px rgba(45,106,79,.4)}
.brand-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:.3px}
.brand-sub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-top:2px}
.topnav{display:flex;gap:4px}
.tnav{padding:8px 17px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;color:rgba(255,255,255,.65);background:transparent;font-family:inherit;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.tnav:hover{color:#fff;background:rgba(255,255,255,.12)}
.tnav.on{background:rgba(255,255,255,.2);color:#fff}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border-radius:20px;padding:5px 14px;font-size:12px;color:rgba(255,255,255,.75);font-family:'JetBrains Mono',monospace}
.live-dot{width:8px;height:8px;border-radius:50%;background:#74c69d;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MAIN ── */
.main{max-width:1400px;margin:0 auto;padding:22px 20px 80px}

/* ── SELECTOR BAR ── */
.selector-bar{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow)}
.sel-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sel-label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.fbtn{padding:8px 18px;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;border:2px solid var(--line2);background:var(--card);color:var(--ink3);transition:all .15s;font-family:inherit}
.fbtn:hover{border-color:var(--primary-m);color:var(--primary)}
.fbtn.on{color:#fff;border-color:transparent;box-shadow:var(--shadow-md)}
.obtn{padding:7px 15px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--line2);background:var(--card);color:var(--ink3);transition:all .15s;font-family:inherit}
.obtn:hover{border-color:var(--primary-m);color:var(--primary)}
.obtn.on{background:var(--primary-l);color:var(--primary);border-color:var(--primary-b);font-weight:600}
.div-v{width:1px;height:32px;background:var(--line);flex-shrink:0}
.fruit-btns{display:flex;gap:6px;flex-wrap:wrap}
.op-btns{display:flex;gap:6px;flex-wrap:wrap}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:all .2s}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--sc,var(--primary));border-radius:var(--r2) var(--r2) 0 0}
.stat:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-lbl{font-size:11px;color:var(--ink3);letter-spacing:.8px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:7px}
.stat-val{font-size:30px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--sv,var(--primary))}
.stat-unit{font-size:12px;color:var(--ink3);margin-top:4px}

/* ── COMPARE CARDS ── */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.cmp{border-radius:var(--r2);padding:18px;border:2px solid;box-shadow:var(--shadow)}
.cmp-best{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:var(--green-b)}
.cmp-worst{background:linear-gradient(135deg,#fff5f5,#fee2e2);border-color:var(--red-b)}
.cmp-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.cmp-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.cmp-row:last-child{border:none}
.cmp-key{color:var(--ink3)}
.cmp-val{font-family:'JetBrains Mono',monospace;font-weight:600}

/* ── BREAKDOWN SECTION ── */
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.bk{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.bk::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--bc,var(--primary))}
.bk-lbl{font-size:11px;color:var(--ink3);margin-bottom:6px;font-weight:500}
.bk-val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--bc,var(--primary));line-height:1}
.bk-unit{font-size:11px;color:var(--ink4);margin-top:3px}
.bk-pct{font-size:13px;font-weight:600;color:var(--ink2);margin-top:2px}

/* ── CHART CARDS ── */
.cc{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s;margin-bottom:14px}
.cc:hover{border-color:var(--line2)}
.cc-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cc.full{grid-column:1/-1}
.cc-hdr{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.cc-title{font-size:13px;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:7px}
.cc-sub{font-size:11px;color:var(--ink4)}
.cc-body{padding:16px}
.ch260{height:260px;position:relative}
.ch300{height:300px;position:relative}
.ch340{height:340px;position:relative}

/* ── BATCH TABLE ── */
.btbl{width:100%;border-collapse:collapse;font-size:13px}
.btbl th{padding:10px 12px;text-align:left;font-weight:600;color:var(--ink3);font-size:11px;border-bottom:2px solid var(--line);background:var(--bg2);letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
.btbl td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.btbl tr:last-child td{border:none}
.btbl tr:hover td{background:var(--bg2)}
.btbl tr.best td{background:#f0fdf4}
.btbl tr.worst td{background:#fff5f5}

/* ── BADGES ── */
.badge{display:inline-flex;padding:3px 9px;border-radius:5px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.bg{background:var(--green-l);color:var(--green-m);border:1px solid var(--green-b)}
.br{background:var(--red-l);color:var(--red-m);border:1px solid var(--red-b)}
.by{background:var(--amber-l);color:var(--amber-m);border:1px solid var(--amber-b)}
.bp{background:var(--primary-l);color:var(--primary);border:1px solid var(--primary-b)}
.tag{display:inline-flex;padding:3px 9px;border-radius:5px;font-size:12px;font-weight:500;border:1px solid}
.t-柚子{background:#fefce8;color:#854d0e;border-color:#fde047}
.t-蘋果{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.t-芒果{background:#fff7ed;color:#9a3412;border-color:#fdba74}
.t-奇異果{background:#f0fdf4;color:#14532d;border-color:#86efac}
.t-橘子{background:#fff7ed;color:#7c2d12;border-color:#fb923c}
.t-蘿蔔{background:#f8fafc;color:#475569;border-color:#cbd5e1}

/* ── SECTION ── */
.sec{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.sec::before,.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--primary-b),transparent)}
.sec-lbl{font-size:11px;font-weight:700;color:var(--primary-m);letter-spacing:2px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* ── TOOLTIP ── */
.tt{position:fixed;z-index:999;background:var(--primary);border-radius:var(--r2);padding:13px 16px;min-width:200px;box-shadow:var(--shadow-lg);pointer-events:none;display:none}
.tt-title{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:1.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.15)}
.tt-row{display:flex;justify-content:space-between;gap:14px;margin-bottom:5px;font-size:13px}
.tt-lbl{color:rgba(255,255,255,.65)}
.tt-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:#fff}

.hidden{display:none!important}
.empty{text-align:center;padding:60px;color:var(--ink4)}
</style>
</head>

Chart.defaults.color='#6b8f71';
Chart.defaults.borderColor='rgba(212,232,214,.6)';
Chart.defaults.font.family="'JetBrains Mono','Noto Sans TC',sans-serif";
Chart.defaults.font.size=12;

document.addEventListener('DOMContentLoaded',loadData);

function loadData(){
  fetch(API+'?action=list&limit=500')
  .then(function(r){return r.json();})
  .then(function(data){
    var sheets=data.batches||[];
    var sids=sheets.map(function(r){return r['批次ID']||'';});
    var bi=BUILTIN.filter(function(b){return sids.indexOf(b.id)<0;});
    var sc=sheets.map(cvtSheet);
    ALL=bi.concat(sc);
    document.getElementById('upd-txt').textContent='更新：'+new Date().toLocaleTimeString('zh-TW');
    initFruits();
  })
  .catch(function(){
    ALL=BUILTIN.slice();
    document.getElementById('upd-txt').textContent='離線（內建資料）';
    initFruits();
  });
}

function cvtSheet(r){
  var raw=parseFloat(r['原料重量 KG'])||parseFloat(r['原料重量KG'])||0;
  var out=parseFloat(r['主產出 KG'])||parseFloat(r['主產出KG'])||0;
  var def=parseFloat(r['不良品 KG'])||parseFloat(r['不良品KG'])||0;
  // 步留率：Sheets存 "67.00%" 或小數 0.67，統一轉成百分比數字
  var yr=parseFloat(String(r['步留率%']||'').replace('%',''))||0;
  if(yr>0&&yr<1)yr=yr*100;  // 小數格式轉換
  var dr=parseFloat(String(r['不良品率%']||'').replace('%',''))||0;
  if(dr>0&&dr<1)dr=dr*100;
  return{id:r['批次ID'],date:fmtDate(r['作業日期']),fruit:r['品種'],op:r['作業類型'],
    raw:raw,out:out,def:def,yr:yr,dr:dr,
    workers:parseFloat(r['作業人數'])||0,
    mh:parseFloat(r['總人力工時hr'])||0,
    eff:parseFloat(r['效率KG/人時'])||0,
    notes:r['備註']||''};
}

function fmtDate(d){
  if(!d)return'';
  var s=String(d);
  if(s.indexOf('T')>-1)s=s.slice(0,10);
  return s.replace(/-/g,'/');
}

function avg(arr){return arr.length?arr.reduce(function(s,v){return s+v;},0)/arr.length:0;}

// ── FRUIT BUTTONS ──────────────────────────
function initFruits(){
  var fruits={};
  ALL.forEach(function(r){if(r.fruit)fruits[r.fruit]=(fruits[r.fruit]||0)+1;});
  document.getElementById('fruit-btns').innerHTML=Object.keys(fruits).map(function(f){
    var fc=FC[f]||{col:'#6b8f71',ico:'🌱'};
    return'<button class="fbtn" data-fruit="'+f+'" onclick="selFruit(\''+f+'\')">'
      +fc.ico+' '+f+' <span style="font-size:11px;opacity:.65">('+fruits[f]+')</span></button>';
  }).join('');
  selFruit(Object.keys(fruits)[0]);
}

function selFruit(fruit){
  SEL_FRUIT=fruit;SEL_OP=null;
  var fc=FC[fruit]||{col:'#2d6a4f'};
  document.querySelectorAll('.fbtn').forEach(function(b){
    var on=b.dataset.fruit===fruit;
    b.classList.toggle('on',on);
    b.style.background=on?fc.col:'';
    b.style.borderColor=on?fc.col:'';
    b.style.color=on?'#fff':'';
  });
  var ops={};
  ALL.filter(function(r){return r.fruit===fruit;}).forEach(function(r){if(r.op)ops[r.op]=(ops[r.op]||0)+1;});
  document.getElementById('op-btns').innerHTML=Object.keys(ops).map(function(op){
    return'<button class="obtn" data-op="'+op+'" onclick="selOp(\''+op+'\')">'
      +op+' <span style="font-size:11px;opacity:.65">('+ops[op]+')</span></button>';
  }).join('');
  selOp(Object.keys(ops)[0]);
}

function selOp(op){
  SEL_OP=op;
  document.querySelectorAll('.obtn').forEach(function(b){b.classList.toggle('on',b.dataset.op===op);});
  render();
}

// ── RENDER ─────────────────────────────────
function render(){
  if(!SEL_FRUIT||!SEL_OP)return;
  var rows=ALL.filter(function(r){return r.fruit===SEL_FRUIT&&r.op===SEL_OP;});
  rows.sort(function(a,b){return a.date.localeCompare(b.date);});
  if(!rows.length){
    document.getElementById('stat-row').innerHTML='<div class="empty">尚無此作業的資料</div>';
    return;
  }
  renderStats(rows);
  renderBreakdown(rows);
  renderCompare(rows);
  renderEff(rows);
  renderYr(rows);
  renderDr(rows);
  renderTable(rows);
}

// ── STATS ──────────────────────────────────
function renderStats(rows){
  var tRaw=rows.reduce(function(s,r){return s+r.raw;},0);
  var tOut=rows.reduce(function(s,r){return s+r.out;},0);
  var tDef=rows.reduce(function(s,r){return s+r.def;},0);
  var avgYr=tRaw>0?tOut/tRaw*100:0;
  var drs=rows.map(function(r){return r.dr;}).filter(Boolean);
  var avgDr=avg(drs);
  var effs=rows.filter(function(r){return r.eff>0&&r.mh>0;}).map(function(r){return r.eff;});
  var avgEff=avg(effs);
  var fc=FC[SEL_FRUIT]||{col:'#2d6a4f'};

  var stats=[
    {lbl:'批次數',val:rows.length,unit:'批',sc:fc.col,sv:fc.col},
    {lbl:'總投入量',val:tRaw.toFixed(0),unit:'KG',sc:'#748cab',sv:'#445e78'},
    {lbl:'平均步留率',val:avgYr.toFixed(1),unit:'%',
      sc:avgYr>=80?'#15803d':avgYr>=65?'#d97706':'#dc2626',
      sv:avgYr>=80?'#14532d':avgYr>=65?'#92400e':'#991b1b'},
    {lbl:'平均不良品率',val:avgDr.toFixed(1),unit:'%',sc:'#dc2626',sv:'#991b1b'},
    {lbl:'平均效率',val:avgEff>0?avgEff.toFixed(1):'N/A',unit:'KG/人時',sc:'#219ebc',sv:'#0d6e8a'},
    {lbl:'最高步留率',val:rows.length?Math.max.apply(null,rows.map(function(r){return r.yr;})).toFixed(1):'N/A',unit:'%',sc:'#15803d',sv:'#14532d'},
    {lbl:'最低步留率',val:rows.length?Math.min.apply(null,rows.map(function(r){return r.yr;})).toFixed(1):'N/A',unit:'%',sc:'#dc2626',sv:'#991b1b'}
  ];

  document.getElementById('stat-row').innerHTML=stats.map(function(s){
    return'<div class="stat" style="--sc:'+s.sc+';--sv:'+s.sv+'">'+
      '<div class="stat-lbl">'+s.lbl+'</div>'+
      '<div class="stat-val">'+s.val+'</div>'+
      '<div class="stat-unit">'+s.unit+'</div></div>';
  }).join('');
}

// ── BREAKDOWN（多產出）─────────────────────
function renderBreakdown(rows){
  var key=SEL_FRUIT+'-'+SEL_OP;
  var cfg=MULTI_OUT[key];
  var sec=document.getElementById('breakdown-section');

  if(!cfg){sec.classList.add('hidden');return;}
  sec.classList.remove('hidden');
  document.getElementById('breakdown-title').textContent=cfg.title;
  document.getElementById('breakdown-chart-title').textContent=cfg.title+' — 各批次佔比';

  // Calculate averages for breakdown cards
  var totals={};
  cfg.parts.forEach(function(p){totals[p.key]=0;});
  var tRaw=0;

  rows.forEach(function(r){
    tRaw+=r.raw;
    var detail=null;
    if(SEL_FRUIT==='柚子'&&SEL_OP==='剝柚子')detail=POMELO_DETAIL[r.id];
    if(SEL_FRUIT==='橘子')detail=TANGERINE_DETAIL[r.id];
    if(detail){
      cfg.parts.forEach(function(p){
        if(p.key==='def')totals.def+=r.def;
        else if(detail[p.key])totals[p.key]+=detail[p.key];
      });
    } else {
      // Fallback
      if(totals.hasOwnProperty('def'))totals.def+=r.def;
    }
  });

  document.getElementById('breakdown-grid').innerHTML=cfg.parts.map(function(p){
    var kg=totals[p.key]||0;
    var pct=tRaw>0?kg/tRaw*100:0;
    return'<div class="bk" style="--bc:'+p.col+'">'+
      '<div class="bk-lbl">'+p.label+'</div>'+
      '<div class="bk-val">'+kg.toFixed(0)+'</div>'+
      '<div class="bk-unit">KG（合計）</div>'+
      '<div class="bk-pct">≈ '+pct.toFixed(1)+'%</div></div>';
  }).join('');

  // Breakdown stacked bar chart
  var labels=rows.map(function(r){return r.date;});
  var datasets=cfg.parts.map(function(p){
    var data=rows.map(function(r){
      var detail=null;
      if(SEL_FRUIT==='柚子'&&SEL_OP==='剝柚子')detail=POMELO_DETAIL[r.id];
      if(SEL_FRUIT==='橘子')detail=TANGERINE_DETAIL[r.id];
      if(p.key==='def')return r.raw>0?r.def/r.raw*100:0;
      if(detail&&detail[p.key]!==undefined)return r.raw>0?detail[p.key]/r.raw*100:0;
      return null;
    });
    return{label:p.label,data:data,backgroundColor:p.col+'cc',borderColor:p.col,borderWidth:1};
  });

  mk('chart-breakdown',{type:'bar',data:{labels:labels,datasets:datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',borderColor:'rgba(45,106,79,1)',borderWidth:1,padding:10,
        callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(1)+'%';}}}},
    scales:{x:{stacked:true,grid:{color:'rgba(212,232,214,.5)'},ticks:{maxRotation:45}},
      y:{stacked:true,max:105,grid:{color:'rgba(212,232,214,.5)'},ticks:{callback:function(v){return v+'%';}}}}
  }});
}

// ── COMPARE ────────────────────────────────
function renderCompare(rows){
  var effRows=rows.filter(function(r){return r.eff>0&&r.mh>0;});
  if(!effRows.length){
    document.getElementById('cmp-grid').innerHTML='<div style="color:var(--ink4);padding:20px;grid-column:1/-1;text-align:center">無效率記錄</div>';
    return;
  }
  var sorted=[...effRows].sort(function(a,b){return b.eff-a.eff;});
  var best=sorted[0],worst=sorted[sorted.length-1];
  function cmpHtml(r,isBest){
    return'<div class="cmp '+(isBest?'cmp-best':'cmp-worst')+'">'+
      '<div class="cmp-title" style="color:'+(isBest?'var(--green-m)':'var(--red-m)')+'">'+
      (isBest?'🏆 最佳批':'⚠️ 最差批')+'</div>'+
      '<div class="cmp-row"><span class="cmp-key">日期</span><span class="cmp-val">'+r.date+'</span></div>'+
      '<div class="cmp-row"><span class="cmp-key">批次</span><span class="cmp-val">'+r.id+'</span></div>'+
      '<div class="cmp-row"><span class="cmp-key">投入量</span><span class="cmp-val">'+r.raw.toLocaleString()+' KG</span></div>'+
      '<div class="cmp-row"><span class="cmp-key">步留率</span><span class="cmp-val" style="color:'+(isBest?'var(--green-m)':'var(--red-m)')+'">'+r.yr.toFixed(1)+'%</span></div>'+
      '<div class="cmp-row"><span class="cmp-key">不良品率</span><span class="cmp-val">'+r.dr.toFixed(1)+'%</span></div>'+
      '<div class="cmp-row"><span class="cmp-key">效率</span><span class="cmp-val" style="color:'+(isBest?'var(--green-m)':'var(--red-m)')+'">'+r.eff.toFixed(2)+' KG/人時</span></div>'+
      (r.notes?'<div class="cmp-row"><span class="cmp-key">備註</span><span style="font-size:11px;color:var(--ink3)">'+r.notes+'</span></div>':'')+
      '</div>';
  }
  document.getElementById('cmp-grid').innerHTML=cmpHtml(best,true)+cmpHtml(worst,false);
}

// ── EFF CHART ──────────────────────────────
function renderEff(rows){
  var labels=rows.map(function(r){return r.date;});
  var effs=rows.map(function(r){return r.eff>0?r.eff:null;});
  var valid=effs.filter(Boolean);
  var avgE=valid.length?avg(valid):0;
  var fc=FC[SEL_FRUIT]||{col:'#2d6a4f'};
  document.getElementById('eff-avg-lbl').textContent='平均 '+avgE.toFixed(2)+' KG/人時';
  var bgCols=rows.map(function(r){return r.eff>0?(r.eff>=avgE?fc.col+'cc':'rgba(220,38,38,.7)'):'rgba(148,163,184,.3)';});
  mk('chart-eff',{type:'bar',data:{labels:labels,datasets:[
    {label:'效率 KG/人時',data:effs,backgroundColor:bgCols,borderColor:bgCols,borderWidth:1.5,borderRadius:5},
    {type:'line',label:'平均 '+avgE.toFixed(1),data:labels.map(function(){return avgE||null;}),
      borderColor:'#94a3b8',borderDash:[5,4],borderWidth:2,pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',borderColor:'rgba(45,106,79,1)',borderWidth:1,padding:10,
        callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y?c.parsed.y.toFixed(2)+' KG/人時':'無工時記錄');}}}},
    scales:{x:{grid:{color:'rgba(212,232,214,.5)'},ticks:{maxRotation:45}},
      y:{grid:{color:'rgba(212,232,214,.5)'},ticks:{callback:function(v){return v+' KG/人時';}}}}
  }});
}

// ── YR CHART ───────────────────────────────
function renderYr(rows){
  var labels=rows.map(function(r){return r.date;});
  var yrs=rows.map(function(r){return r.yr||null;});
  var valid=yrs.filter(Boolean);
  var avgYr=valid.length?avg(valid):0;
  var fc=FC[SEL_FRUIT]||{col:'#2d6a4f'};
  document.getElementById('yr-avg-lbl').textContent='平均 '+avgYr.toFixed(1)+'%';
  mk('chart-yr',{type:'line',data:{labels:labels,datasets:[
    {label:'步留率',data:yrs,borderColor:fc.col,backgroundColor:fc.col+'18',fill:true,tension:0.4,
      pointRadius:7,pointHoverRadius:10,
      pointBackgroundColor:rows.map(function(r){return r.yr>=avgYr?fc.col:'#dc2626';}),
      pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:2.5,spanGaps:true},
    {label:'平均 '+avgYr.toFixed(1)+'%',data:labels.map(function(){return avgYr||null;}),
      borderColor:'#9ab89f',borderDash:[5,4],borderWidth:2,pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',borderColor:'rgba(45,106,79,1)',borderWidth:1,padding:10,
        callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y?c.parsed.y.toFixed(1)+'%':'無資料');}}}},
    scales:{x:{grid:{color:'rgba(212,232,214,.5)'},ticks:{maxRotation:45}},
      y:{grid:{color:'rgba(212,232,214,.5)'},ticks:{callback:function(v){return v+'%';}}}}
  }});
}

// ── DR CHART ───────────────────────────────
function renderDr(rows){
  var labels=rows.map(function(r){return r.date;});
  var drs=rows.map(function(r){return r.dr||null;});
  var valid=drs.filter(Boolean);
  var avgDr=valid.length?avg(valid):0;
  document.getElementById('dr-avg-lbl').textContent='平均 '+avgDr.toFixed(1)+'%';
  mk('chart-dr',{type:'bar',data:{labels:labels,datasets:[
    {label:'不良品率',data:drs,
      backgroundColor:rows.map(function(r){return r.dr>avgDr?'rgba(220,38,38,.75)':'rgba(244,162,97,.75)';}),
      borderColor:rows.map(function(r){return r.dr>avgDr?'#dc2626':'#f4a261';}),
      borderWidth:1.5,borderRadius:5},
    {type:'line',label:'平均 '+avgDr.toFixed(1)+'%',data:labels.map(function(){return avgDr||null;}),
      borderColor:'#9ab89f',borderDash:[5,4],borderWidth:2,pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:14}},
      tooltip:{backgroundColor:'rgba(45,106,79,.95)',borderColor:'rgba(45,106,79,1)',borderWidth:1,padding:10,
        callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y?c.parsed.y.toFixed(1)+'%':'無資料');}}}},
    scales:{x:{grid:{color:'rgba(212,232,214,.5)'},ticks:{maxRotation:45}},
      y:{grid:{color:'rgba(212,232,214,.5)'},ticks:{callback:function(v){return v+'%';}}}}
  }});
}

// ── TABLE ──────────────────────────────────
function renderTable(rows){
  var effRows=rows.filter(function(r){return r.eff>0;});
  var bestEff=effRows.length?Math.max.apply(null,effRows.map(function(r){return r.eff;})):0;
  var worstEff=effRows.length>1?Math.min.apply(null,effRows.map(function(r){return r.eff;})):0;
  var avgYr=avg(rows.map(function(r){return r.yr;}).filter(Boolean));

  var html=rows.map(function(r){
    var isBest=r.eff>0&&r.eff===bestEff;
    var isWorst=effRows.length>1&&r.eff>0&&r.eff===worstEff;
    var yrBadge=r.yr>=(avgYr+1)?'bg':r.yr>=(avgYr-3)?'bp':'br';
    return'<tr class="'+(isBest?'best':isWorst?'worst':'')+'">'+
      '<td style="font-size:16px">'+(isBest?'🏆':isWorst?'⚠️':'')+'</td>'+
      '<td style="font-family:JetBrains Mono,monospace;font-size:13px;white-space:nowrap">'+r.date+'</td>'+
      '<td style="font-family:JetBrains Mono,monospace;color:var(--ink3);font-size:11px">'+r.id+'</td>'+
      '<td style="font-family:JetBrains Mono,monospace;text-align:right">'+r.raw.toLocaleString()+'</td>'+
      '<td style="font-family:JetBrains Mono,monospace;text-align:right">'+r.out.toLocaleString()+'</td>'+
      '<td><span class="badge '+yrBadge+'">'+r.yr.toFixed(1)+'%</span></td>'+
      '<td><span class="badge '+(r.dr>(avgYr>50?10:5)?'br':'by')+'">'+r.dr.toFixed(1)+'%</span></td>'+
      '<td style="font-family:JetBrains Mono,monospace;text-align:right">'+r.def+'</td>'+
      '<td style="font-family:JetBrains Mono,monospace;text-align:center">'+(r.workers||'-')+'</td>'+
      '<td style="font-family:JetBrains Mono,monospace;text-align:center">'+(r.mh||'-')+'</td>'+
      '<td style="font-family:JetBrains Mono,monospace;font-weight:700;text-align:right;color:'+(r.eff>0?(isBest?'var(--green-m)':isWorst?'var(--red-m)':'var(--ink)'):'var(--ink4)')+'">'+
      (r.eff>0?r.eff.toFixed(2):'無記錄')+'</td>'+
      '<td style="font-size:12px;color:var(--ink3);max-width:200px">'+r.notes+'</td>'+
      '</tr>';
  }).join('');

  document.getElementById('batch-table').innerHTML=
    '<table class="btbl"><thead><tr>'+
    '<th></th><th>日期</th><th>批次</th><th style="text-align:right">投入KG</th><th style="text-align:right">產出KG</th>'+
    '<th>步留率</th><th>不良品率</th><th style="text-align:right">不良品KG</th>'+
    '<th style="text-align:center">人數</th><th style="text-align:center">工時hr</th>'+
    '<th style="text-align:right">效率KG/人時</th><th>備註</th>'+
    '</tr></thead><tbody>'+html+'</tbody></table>';
}

function mk(id,cfg){
  if(CH[id]){CH[id].destroy();delete CH[id];}
  var ctx=document.getElementById(id);if(!ctx)return;
  CH[id]=new Chart(ctx,cfg);
}
</script>
