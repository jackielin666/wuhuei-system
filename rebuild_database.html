function addLog(msg,cls){
  var el=document.getElementById('log');
  var d=document.createElement('div');
  d.className=cls||'';d.textContent=msg;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function setP(pct,lbl){
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('lbl').textContent=lbl;
}

async function run(){
  var btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='⏳ 寫入中...';
  document.getElementById('log').innerHTML='';
  addLog('🚀 開始寫入 B001~B024...','info');
  var ok=0,fail=0;
  for(var i=0;i<B.length;i++){
    var b=B[i];
    var pct=Math.round((i+1)/B.length*100);
    setP(pct,'寫入 '+b.batchId+' ('+(i+1)+'/'+B.length+')');
    try{
      var url=API+'?action=write&data='+encodeURIComponent(JSON.stringify(b));
      var r=await fetch(url);
      var res=await r.json();
      if(res.status==='ok'){
        addLog('✅ '+b.batchId+' '+b.fruit+' '+b.op,'ok');ok++;
      } else {
        addLog('❌ '+b.batchId+' '+(res.message||'失敗'),'err');fail++;
      }
    }catch(e){
      addLog('❌ '+b.batchId+' '+e.message,'err');fail++;
    }
    await new Promise(function(r){setTimeout(r,500);});
  }
  setP(100,'完成！');
  addLog('','info');
  addLog('=============================','info');
  addLog('✅ 成功：'+ok+' 筆  ❌ 失敗：'+fail+' 筆','ok');
  if(fail===0){
    addLog('🎉 全部完成！請到 Google Sheets 確認','ok');
    btn.textContent='✅ 完成';btn.style.background='#15803d';
  } else {
    btn.disabled=false;btn.textContent='🔄 重試';
  }
}
